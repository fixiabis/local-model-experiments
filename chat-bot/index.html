<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemma 4 Chat</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      [hidden] { display: none !important; }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: #2a2d3a;
        --accent: #7c6af7;
        --text: #e2e4ed;
        --text-muted: #6b7080;
        --user-bg: #2a2060;
        --radius: 12px;
      }

      html, body { height: 100%; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* Header */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
      }

      header h1 { font-size: 16px; font-weight: 600; }

      #status { font-size: 13px; color: var(--text-muted); }

      /* Progress */
      #progress {
        padding: 8px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      #progress-track {
        background: var(--border);
        border-radius: 999px;
        height: 4px;
        overflow: hidden;
        margin-bottom: 4px;
      }

      #progress-bar {
        height: 100%;
        background: var(--accent);
        border-radius: 999px;
        transition: width 0.2s ease;
        width: 0%;
      }

      #progress-text { font-size: 12px; color: var(--text-muted); }

      /* Chat */
      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .message {
        display: flex;
        max-width: 720px;
        width: 100%;
      }

      .message.user { align-self: flex-end; flex-direction: row-reverse; }
      .message.assistant { align-self: flex-start; }

      .bubble {
        padding: 10px 14px;
        border-radius: var(--radius);
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .message.user .bubble {
        background: var(--user-bg);
        border-bottom-right-radius: 4px;
      }

      .message.assistant .bubble {
        background: var(--surface);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }

      .bubble p { white-space: pre-wrap; word-break: break-word; }
      .bubble p + p { margin-top: 4px; }

      .attach-img {
        display: block;
        max-width: 320px;
        max-height: 240px;
        border-radius: 8px;
        margin-bottom: 6px;
        object-fit: contain;
      }

      .attach-audio {
        display: block;
        width: 100%;
        margin-bottom: 6px;
      }

      /* Input area */
      #input-area {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 10px 20px 14px;
        border-top: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
      }

      /* Attachment preview */
      #attach-preview {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 13px;
        color: var(--text-muted);
      }

      #attach-clear {
        margin-left: auto;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 0 2px;
      }

      #attach-clear:hover { color: var(--text); }

      #input-row {
        display: flex;
        align-items: flex-end;
        gap: 10px;
      }

      /* Attach button */
      #attach-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 18px;
        padding: 8px 10px;
        flex-shrink: 0;
        transition: color 0.15s, border-color 0.15s;
        line-height: 1;
      }

      #attach-btn:hover { color: var(--text); border-color: var(--accent); }
      #attach-btn:disabled { opacity: 0.4; cursor: not-allowed; }

      #input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 15px;
        line-height: 1.5;
        padding: 10px 14px;
        resize: none;
        max-height: 200px;
        overflow-y: auto;
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }

      #input:focus { border-color: var(--accent); }
      #input:disabled { opacity: 0.4; cursor: not-allowed; }
      #input::placeholder { color: var(--text-muted); }

      #send {
        background: var(--accent);
        border: none;
        border-radius: var(--radius);
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        padding: 10px 18px;
        flex-shrink: 0;
        transition: opacity 0.15s;
      }

      #send:disabled { opacity: 0.4; cursor: not-allowed; }
      #send:not(:disabled):hover { opacity: 0.85; }
    </style>
    <script type="module" crossorigin src="/local-model-experiments/chat-bot/assets/index-CA4REzwk.js"></script>
  </head>
  <body>
    <header>
      <h1>Gemma 4 E2B</h1>
      <span id="status">初始化中...</span>
    </header>

    <div id="progress" hidden>
      <div id="progress-track">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-text"></div>
    </div>

    <div id="chat"></div>

    <div id="input-area">
      <div id="attach-preview" hidden>
        <span>📎</span>
        <span id="attach-name"></span>
        <button id="attach-clear" title="移除附件">✕</button>
      </div>
      <div id="input-row">
        <input id="file-input" type="file" accept="image/*,audio/*" hidden />
        <button id="attach-btn" disabled title="附加圖片或音訊">📎</button>
        <textarea
          id="input"
          placeholder="輸入訊息... (Enter 送出，Shift+Enter 換行)"
          rows="1"
          disabled
        ></textarea>
        <button id="send" disabled>送出</button>
      </div>
    </div>

    <script>
      // Register service worker that injects COOP/COEP headers (required for WASM multi-threading).
      // On first visit the page reloads once after the SW activates — subsequent visits are instant.
      if ('serviceWorker' in navigator && !window.crossOriginIsolated) {
        navigator.serviceWorker.register('./coi-serviceworker.js').then((reg) => {
          if (reg.active) {
            window.location.reload();
          } else {
            reg.addEventListener('updatefound', () => {
              reg.installing?.addEventListener('statechange', (e) => {
                if (e.target.state === 'activated') window.location.reload();
              });
            });
          }
        });
      }
    </script>
  </body>
</html>
