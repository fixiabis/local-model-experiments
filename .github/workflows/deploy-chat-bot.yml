name: Deploy chat-bot to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'chat-bot/**'
      - '.github/workflows/deploy-chat-bot.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chat-bot/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: chat-bot

      - name: Build
        run: npm run build
        working-directory: chat-bot

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: chat-bot/dist
          destination_dir: chat-bot
          keep_files: true   # preserve other apps deployed to the same branch
